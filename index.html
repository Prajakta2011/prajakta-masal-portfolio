    <script>
        // Interactive Particle Background
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3b82f6';
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.1)';

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();

    <script>
      AOS.init({
        duration: 1000,
        once: true,
      });

      // Navbar Scroll Effect
      window.onscroll = function() {
          const nav = document.querySelector('nav');
          const backToTop = document.getElementById('backToTop');
          
          if (window.pageYOffset > 50) {
              nav.classList.add('scrolled');
          } else {
              nav.classList.remove('scrolled');
          }

          if (window.pageYOffset > 300) {
              backToTop.style.display = "flex";
          } else {
              backToTop.style.display = "none";
          }
      };

      // Back to Top Function
      function scrollToTop() {
          window.scrollTo({
              top: 0,
              behavior: 'smooth'
          });
      }

      // Modal Functions
      function openModal(title, description) {
          document.getElementById('modalTitle').innerText = title;
          document.getElementById('modalDescription').innerText = description;
          document.getElementById('certModal').style.display = 'block';
          document.body.style.overflow = 'hidden'; // Prevent scroll
      }

      function closeModal() {
          document.getElementById('certModal').style.display = 'none';
          document.body.style.overflow = 'auto'; // Re-enable scroll
      }

      // Mobile Menu Toggle
      const mobileMenuButton = document.getElementById('mobile-menu-button');
      const mobileMenu = document.getElementById('mobile-menu');
      
      mobileMenuButton.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
          const icon = mobileMenuButton.querySelector('i');
          icon.classList.toggle('fa-bars');
          icon.classList.toggle('fa-times');
      });

      // Close mobile menu when clicking a link
      const mobileMenuLinks = mobileMenu.querySelectorAll('a');
          mobileMenuLinks.forEach(link => {
          link.addEventListener('click', () => {
              mobileMenu.classList.add('hidden');
              const icon = mobileMenuButton.querySelector('i');
              icon.classList.add('fa-bars');
              icon.classList.remove('fa-times');
          });
      });

      // Typewriter Effect
      const words = ["Computer Engineering Graduate", "Big Data Enthusiast", "Snowflake Specialist", "Cloud Solutions Architect"];
      let i = 0;
      let j = 0;
      let currentWord = "";
      let isDeleting = false;
      const typewriterElement = document.getElementById('typewriter');

      function type() {
          currentWord = words[i];
          if (isDeleting) {
              typewriterElement.textContent = currentWord.substring(0, j - 1);
              j--;
              if (j == 0) {
                  isDeleting = false;
                  i = (i + 1) % words.length;
              }
          } else {
              typewriterElement.textContent = currentWord.substring(0, j + 1);
              j++;
              if (j == currentWord.length) {
                  isDeleting = true;
                  setTimeout(type, 1500); // Wait before starting to delete
                  return;
              }
          }
          setTimeout(type, isDeleting ? 50 : 100);
      }
      type();

      // Stats Counter Animation
      const counters = document.querySelectorAll('.counter');
      const speed = 200;

      const animateCounters = () => {
          counters.forEach(counter => {
              const updateCount = () => {
                  const target = +counter.getAttribute('data-target');
                  const count = +counter.innerText;
                  const inc = target / speed;

                  if (count < target) {
                      counter.innerText = Math.ceil(count + inc);
                      setTimeout(updateCount, 1);
                  } else {
                      counter.innerText = target;
                  }
              };
              updateCount();
          });
      };

      // Trigger animation when section is in view
      const statsSection = document.querySelector('.counter').parentElement.parentElement.parentElement;
      const observer = new IntersectionObserver((entries) => {
          if(entries[0].isIntersecting) {
              animateCounters();
              observer.unobserve(statsSection);
          }
      }, { threshold: 0.5 });

      observer.observe(statsSection);
    </script>
